<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Australia Trip</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<meta name="theme-color" content="#0b1f35">

</head>

<body>

<!-- Hero -->

<header class="hero">

<img
src="https://images.unsplash.com/photo-1523428096881-5bd79d043006?w=1600"
class="hero-img">

<div class="hero-mask">

<h1>🇦🇺 Australia Road Trip</h1>

<p>

Sydney

→ Blue Mountains

→ Kiama

→ Gold Coast

→ Brisbane

</p>

</div>

</header>

<!-- Dashboard -->

<section class="dashboard">

<div class="card">

<span>📍 城市</span>

<h2 id="currentCity">

Sydney

</h2>

</div>

<div class="card">

<span>📅 Day</span>

<h2 id="currentDay">

1

</h2>

</div>

<div class="card">

<span>🌤 天氣</span>

<h2>

16°C

</h2>

</div>

<div class="card">

<span>💰 今日預算</span>

<h2>

0 AUD

</h2>

</div>

</section>

<!-- Navigation -->

<nav class="bottom-nav">

<button class="nav-btn active"

data-page="trip">

🗺️

<span>行程</span>

</button>

<button class="nav-btn"

data-page="packing">

🧳

<span>行李</span>

</button>

<button class="nav-btn"

data-page="expense">

💰

<span>記帳</span>

</button>

<button class="nav-btn"

data-page="more">

⚙️

<span>更多</span>

</button>

</nav>

<!-- ==================== -->

<!-- 行程 -->

<!-- ==================== -->

<section

id="tripPage"

class="page active">

<div class="page-title">

<h2>

🗺️ 行程規劃

</h2>

<button id="addTripBtn">

＋ 新增

</button>

</div>

<input

id="searchTrip"

type="text"

placeholder="搜尋景點">

<div id="tripContainer">

</div>

</section>

<!-- ==================== -->

<!-- 行李 -->

<!-- ==================== -->

<section

id="packingPage"

class="page">

<div class="page-title">

<h2>

🧳 澳洲行李清單

</h2>

<button id="addPackingBtn">

＋

</button>

</div>

<div id="packingContainer">

</div>

</section>

<!-- ==================== -->

<!-- 記帳 -->

<!-- ==================== -->

<section

id="expensePage"

class="page">

<div class="page-title">

<h2>

💰 旅遊記帳

</h2>

<button id="addExpenseBtn">

＋

</button>

</div>

<div class="expense-total">

Total

<span id="expenseTotal">

0 AUD

</span>

</div>

<div id="expenseContainer">

</div>

</section>

<!-- ==================== -->

<!-- 更多 -->

<!-- ==================== -->

<section

id="morePage"

class="page">

<div class="page-title">

<h2>

⚙️ 更多

</h2>

</div>

<div class="menu-list">

<button id="exportBtn">

📤 匯出資料

</button>

<button id="importBtn">

📥 匯入資料

</button>

<button id="clearBtn">

🗑 清除全部資料

</button>

</div>

</section>

<script src="app.js"></script>

</body>

</html>
